<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Context Notes — Dashboard</title>
  </head>
  <body>
    <div class="app" data-od-id="dashboard">
      <!-- ============ SIDEBAR ============ -->
      <aside class="sidebar" id="sidebar" data-od-id="sidebar">
        <div class="side-head">
          <div class="wordmark"><span class="glyph"></span>Context&nbsp;Notes</div>
        </div>

        <div class="proj-switch" data-od-id="project-switcher">
          <button class="proj-btn" id="projBtn" aria-expanded="false" aria-haspopup="menu">
            <span class="spine"></span>
            <span class="pm"><span class="pn" id="pName">Loading…</span><span class="ps" id="pSub"></span></span>
            <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="15" height="15"><path d="m6 9 6 6 6-6" /></svg>
          </button>
          <div class="proj-menu" id="projMenu" role="menu"></div>
        </div>

        <nav class="nav" id="nav" aria-label="Sections"></nav>

        <div class="side-foot">
          <div class="avatar">TL</div>
          <div class="who"><b>You</b><span>Owner</span></div>
        </div>
      </aside>

      <!-- ============ MAIN ============ -->
      <div class="main">
        <header class="topbar">
          <button class="btn btn--ghost btn--sm menu-toggle" id="menuToggle" aria-label="Open navigation">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" width="18" height="18"><path d="M3 6h18M3 12h18M3 18h18" /></svg>
          </button>
          <div class="tb-titles">
            <div class="tb-title" id="viewTitle">Overview</div>
            <div class="tb-sub" id="viewSub"></div>
          </div>
          <div class="tb-actions" id="viewActions"></div>
        </header>
        <main class="view" id="view" tabindex="-1"></main>
        <footer class="credit" data-od-id="credit-footer">
          <a href="mailto:dev@attv.uk">dev@attv.uk</a>
          <span class="sep">·</span>
          Project &amp; Development: Tomasz &lsquo;Amigo&rsquo; Lewandowski
          <span class="sep">·</span>
          <a href="https://www.attv.uk" target="_blank" rel="noreferrer">www.attv.uk</a>
          <span class="sep">·</span>
          <a href="https://github.com/AmigoUK/Research-Chrome-Extension" target="_blank" rel="noreferrer">GitHub</a>
          <span class="sep">·</span>
          <span class="ver" id="appVersion"></span>
        </footer>
      </div>
    </div>

    <div class="scrim" id="scrim"></div>
    <div class="popover" id="pop"></div>
    <div class="toast-wrap" id="toastWrap" role="status" aria-live="polite"></div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
